name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        df -h

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fix git ownership
      run: |
        sudo chown -R $USER:$USER $GITHUB_WORKSPACE
        git config --global user.email "builder@github.com"
        git config --global user.name "GitHub Builder"
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --global --add safe.directory '*'
        sudo git config --system --add safe.directory '*'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          lld \
          ccache \
          python3-dev \
          build-essential \
          libltdl-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip wheel setuptools
        pip install buildozer==1.5.0 cython==0.29.36 virtualenv

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-v3-

    - name: Build APK with Buildozer
      run: |
        export GIT_CONFIG_GLOBAL=/dev/null
        yes | buildozer -v android debug 2>&1 | tee build.log || true
        # Check if APK was created despite errors
        if ls bin/*.apk 1> /dev/null 2>&1; then
          echo "APK built successfully!"
        else
          echo "Build may have failed, checking logs..."
          tail -100 build.log
        fi
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        GIT_AUTHOR_NAME: "builder"
        GIT_AUTHOR_EMAIL: "builder@github.com"
        GIT_COMMITTER_NAME: "builder"
        GIT_COMMITTER_EMAIL: "builder@github.com"

    - name: List build outputs
      if: always()
      run: |
        echo "=== Checking bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== Checking for APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: orion-ddh-apk
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        retention-days: 7
